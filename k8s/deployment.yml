apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-app
        image: prateekmall/devops-app:v1
        ports:
        - containerPort: 8000
